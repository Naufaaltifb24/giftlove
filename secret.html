<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
/* BACKGROUND GRADIENT HALUS */
.secret-bg {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a0010, black);
    text-align: center;
}

/* TEKS UTAMA */
.secret-text {
    font-size: 28px;
    max-width: 600px;
    line-height: 1.6;
    animation: fadeIn 2s ease;
}

/* ANIMASI KETIK */
.typewriter {
    border-right: 3px solid #ff4da6;
    white-space: nowrap;
    overflow: hidden;
    animation: typing 3s steps(40), blinkCursor 1s infinite;
}

/* KEYFRAMES */
@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

/* LOVE JATUH */
.love {
    position: fixed;
    top: -10px;
    color: #ff4da6;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="secret-bg">

    <h1 class="glow">Untuk Kamu 💖</h1>

    <p class="secret-text typewriter">
        Lopyu polepelll cengku ❤️
    </p>

    <br>

    <a href="index.html" class="btn">Back 🖤</a>

</div>

<script>
// LOVE JATUH
setInterval(() => {
    const love = document.createElement("div");
    love.innerHTML = "💖";
    love.className = "love";

    love.style.left = Math.random() * 100 + "vw";
    love.style.fontSize = Math.random() * 20 + 20 + "px";
    love.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(love);

    setTimeout(() => love.remove(), 5000);
}, 300);
</script>

</body>
</html>
